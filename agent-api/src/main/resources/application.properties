server.port=3030

server.tomcat.connection-timeout=900000

spring.application.name=searcher-app
spring.main.allow-bean-definition-overriding=true

# Google Gemini
spring.ai.google.genai.api-key=${GOOGLE_API_KEY}

# MCP Client
spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.initialized=true
spring.ai.mcp.client.name=searcher-mcp-client
spring.ai.mcp.client.type=SYNC
spring.ai.mcp.client.request-timeout=300s
spring.ai.mcp.client.sse.connections.server1.url=http://0.0.0.0:8000/sse
spring.ai.mcp.client.toolcallback.enabled=false

spring.mcp.server.url=http://0.0.0.0:8000/sse

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# JWT
jwt.secret=${JWT_SECRET:myDefaultSecretKeyForDevelopmentOnlyPleaseReplaceInProduction1234567890}
jwt.expiration=86400000

# Neo4j
spring.neo4j.uri=bolt://0.0.0.0:9090
spring.neo4j.ai.initialize-schema=true
spring.neo4j.ai.database-name=neo4j-vec
spring.neo4j.ai.embedding-dimension=1536
spring.neo4j.ai.distance-type=cosine