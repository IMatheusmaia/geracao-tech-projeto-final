services:
  agent-browser:
    container_name: agent-browser
    build:
      context: ./agent-browser
      dockerfile: .Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./agent-browser/.env
  
  redis:
    container_name: redis
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"  # Redis Insight (UI web para inspecionar os dados)

  chat-memory:
    container_name: neo4j
    image: neo4j:5.26.24-ubi9
    ports:
      - "9090:7687"
      - "7474:7474"
    environment:
      - NEO4J_AUTH=none