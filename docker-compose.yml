services:
  agent-browser:
    container_name: agent-browser
    build:
      context: ./agent-browser
      dockerfile: .Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./agent-browser/.env
  
  redis:
    container_name: redis
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"  # Redis Insight (UI web para inspecionar os dados)